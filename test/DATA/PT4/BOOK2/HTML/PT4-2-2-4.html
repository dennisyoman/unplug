  }

  .PT4-2-2-4 .contents > div.selected .sensorArea .sensor.wrong:before {

  }
</style>
<script>
  var newCheckAnswer_PT4_2_2_4 = function () {
    event.stopPropagation();
    event.stopImmediatePropagation();
    console.log("newCheckAnswer_PT4_2_2_4");
    //
    var correctSequence = [
      "清理烤箱>做甜點",
      "買食材>做甜點",
      "買掃把>清理地板",
      "做甜點>甜點上架",
      "甜點上架>開店營業",
      "清理地板>開店營業",
      "氣球裝飾>開店營業",
      "修好貨架>甜點上架",
    ];

    var pairAmount = 8;
    var gotWrong = false;
    var seenCombo = {};
    for (var i = 1; i <= pairAmount; i++) {
      var pair = $(".PT4-2-2-4 .sensorArea .sensor[pair='" + i + "']");
      if (!pair.eq(0).hasClass("addup")) {
        var textCombo = pair.eq(0).text() + ">" + pair.eq(1).text();

        // 判斷 textCombo 不能重複；重複時「後面的」要加上 wrong
        if (seenCombo[textCombo]) {
          var alertmsg = "工作先後關係不能重複輸入。";
          $(".alert").remove();
          $(".PT4-2-2-4 .contents > div.selected").append(
            `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
          );
          //
          pair.eq(0).addClass("wrong");
          pair.eq(1).addClass("wrong");
          gotWrong = true;
          continue;
        }
        seenCombo[textCombo] = true;
        if (!correctSequence.includes(textCombo)) {
          var alertmsg = "先後關係有錯誤。";
          $(".alert").remove();
          $(".PT4-2-2-4 .contents > div.selected").append(
            `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
          );
          //
          pair.eq(0).addClass("wrong");
          pair.eq(1).addClass("wrong");
          gotWrong = true;
        } else {
          pair.eq(0).removeClass("wrong");
          pair.eq(1).removeClass("wrong");
        }
      }
    }
    if (gotWrong) {
      rootSoundEffect($stupid);
    } else {
      bingo();
    }
  };
  var updateMission3 = function () {
    $(".PT4-2-2-4 .addup").removeClass("addup");
  };
  // global flag: keep existing value if already defined
  if (typeof window.PT4_2_2_mission3 === "undefined") {
    //表示還沒有玩過任務三
    window.PT4_2_2_mission3 = false;
    console.log("還沒任務三");
  } else {
    //已經玩過任務三了
    console.log("已經任務三");
    updateMission3();
  }
</script>
