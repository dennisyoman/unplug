<script>
  var revealAnswer = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    item.html(item.attr("ans"));
    rootSoundEffect($help);
  };

  var toggleActive = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    $(".showTrigger").remove();
    item.append(`
    <div class='showTrigger'>
      <span onClick="activateShow($(this).closest('.column-show'),true)">O</span>
      <span onClick="activateShow($(this).closest('.column-show'),false)">X</span>
    </div>`);
    rootSoundEffect($pop);
  };

  var activateShow = (item, boolean) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    rootSoundEffect($key);
    if (boolean) {
      item.addClass("active");
      item.removeClass("inactive");
    } else {
      item.addClass("inactive");
      item.removeClass("active");
    }
    $(".showTrigger").remove();
    //
    var target = item.attr("target");
    var targetList = $("#" + target);
    var siblings = item.parent().find("[target=" + target + "]");
    var array = [];
    siblings.each(function () {
      if ($(this).hasClass("active")) {
        array.push($(this).text().replace(/\s+/g, "").split(".")[0]);
      }
    });
    targetList.text(array.join(","));
    //
    $(".PT4-2-1-5-2 .sideTool > div.btn_check").show();
    $(".PT4-2-1-5-2 .sideTool > div.btn_replay").show();
    $(".PT4-2-1-5-2 .sideTool > div.btn_answer").removeClass("active");
  };

  var newShowAnswer = function () {
    event.stopPropagation();
    event.stopImmediatePropagation();
    $(".showTrigger").remove();
    $(".PT4-2-1-5-2 .sideTool > div.btn_answer").toggleClass("active");
    if ($(".PT4-2-1-5-2 .sideTool > div.btn_answer").hasClass("active")) {
      $(".PT4-2-1-5-2 .contents > div.selected .column-text").each(function () {
        $(this).text($(this).attr("ans").split("^")[0]);
      });
      $(".PT4-2-1-5-2 .contents > div.selected .column-show").each(function () {
        $(this).removeClass("active inactive");
        if ($(this).attr("ans") == "1") {
          $(this).addClass("active");
        } else {
          $(this).addClass("inactive");
        }
      });
      rootSoundEffect($help);
    } else {
      withinResetElem();
    }
  };

  var newCheckAnswer = function () {
    event.stopPropagation();
    event.stopImmediatePropagation();
    //
    var target = $(".PT4-2-1-5-2 .contents > div.selected .column-text").last();
    var ans = target.attr("ans").split("^");
    var guess = target.text();
    var gotit = false;
    for (var i = 0; i < ans.length; i++) {
      if (ans[i] == guess) {
        gotit = true;
        break;
      }
    }
    if (gotit) {
      bingo();
    } else {
      rootSoundEffect($stupid);
    }
  };

  //dynamic function for this html only

  var withinResetElem = function () {
    $(".PT4-2-1-5-2 .contents > div.selected .column-text").each(function () {
      $(this).html("");
    });
    $(".PT4-2-1-5-2 .contents > div.selected .column-show").removeClass(
      "active inactive",
    );
    $(".showTrigger").remove();
    rootSoundEffect($show);
  };
</script>
