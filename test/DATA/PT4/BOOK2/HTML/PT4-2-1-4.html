<style>
  .PT4-2-1-4 .timetable1 {
    position: absolute;
    top: 250px;
    left: 300px;
    width: 250px;
    pointer-events: auto;
    z-index: 10;
  }
  .PT4-2-1-4 .toy:has(.show-card) {
    width: auto !important;
    height: 20px !important;
    display: grid;
    place-items: center left;
  }
  .PT4-2-1-4 .toys {
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .PT4-2-1-4 .toys .toy.disable .show-card,
  .PT4-2-1-4 .toys .toy.cached .show-card {
    opacity: 0;
  }
  .PT4-2-1-4 .toys .toy.semiTransparent .show-card {
    opacity: 0.3;
  }

  .PT4-2-1-4 .show-card {
    position: relative;
    display: inline-block;
    width: 73px;
    height: calc(100% - 2px);
    background: #fdead1;
    border: 1px solid #ee79368a;
    font-size: 8px !important;
    line-height: 1.2;
    color: #ee7836;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }
  .PT4-2-1-4 .show-card > span {
    flex: 0 0 auto;
    width: 6px;
    font-size: 10px;
    margin: 0 2px;
    color: #000;
    font-weight: bold;
    display: none;
    text-align: center;
  }

  .PT4-2-1-4 .cardAvatarDie:has(.show-card) {
    width: auto !important;
  }

  .PT4-2-1-4 .cardAvatar .show-card {
    justify-content: space-between;
    width: calc(var(--duration) * 12.2px);
  }
  .PT4-2-1-4 .cardAvatarDie .toy.cached .show-card > span {
    display: none !important;
  }
  .PT4-2-1-4 .cardAvatarDie .show-card > span {
    display: block;
    pointer-events: auto;
  }

  .PT4-2-1-4 .column-text,
  .PT4-2-1-4 .column-name {
    position: absolute;
    z-index: 2;
    font-size: 10px;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    pointer-events: auto;
  }

  .PT4-2-1-4 .column-text:not(:empty),
  .PT4-2-1-4 .column-name:not(:empty) {
    border: none;
  }
</style>
<script>
  var shortenDuration = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    var currentDuration =
      item.parent().attr("style").split("--duration: ")[1] * 1;
    console.log(currentDuration);
    if (currentDuration > 1) {
      item.parent().attr("style", "--duration: " + (currentDuration - 1));
    }
  };
  var extendDuration = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    var currentDuration =
      item.parent().attr("style").split("--duration: ")[1] * 1;
    console.log(currentDuration);
    if (currentDuration < 9) {
      item.parent().attr("style", "--duration: " + (currentDuration + 1));
    }
  };
  var modifyName = (item) => {
    event.stopPropagation();
    var text = window.prompt("請輸入答案：", "");
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      rootSoundEffect($pop);
      item.html(text);
      rootSoundEffect($key);
    }
  };

  //dynamic function for this html only
  var withinShowAnswer = function (boolean) {
    if (boolean) {
      $(".PT4-2-1-4 .contents > div.selected .column-name").each(function () {
        $(this).html($(this).attr("ans"));
      });
    } else {
      withinResetElem();
    }
  };

  var withinResetElem = function () {
    $(".PT4-2-1-4 .contents > div.selected .column-name").each(function () {
      $(this).html("");
    });

    rootSoundEffect($show);
  };
</script>
