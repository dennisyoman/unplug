<script>
  var modifyName = (item) => {
    event.stopPropagation();
    var text = window.prompt("請輸入答案：", "");
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      rootSoundEffect($pop);
      item.html(text);
      rootSoundEffect($key);
    }
  };

  var tapElem = function (tar) {
    var $t = $(tar);
    // 只處理這一頁的 simplyDrag（例如點一下刪除）
    var $die = $t.closest(".cardAvatarDie.simplyDrag");
    if ($die.length) {
      var src1 = $die.find("img").attr("src");
      $(".contents > div.selected")
        .find(".toys > div")
        .each(function () {
          if (src1 == $(this).find("img").attr("src")) {
            $(this).removeClass("cached semiTransparent positionBingo");
          }
        });
      $die.remove();
      rootSoundEffect($show);
      return;
    }
    // 其他點擊行為...（不寫就交給別的元素原本的 onclick）
  };

  //dynamic function for this html only
  var withinShowAnswer = function (boolean) {
    if (boolean) {
      $(".PT4-2-2-5 .contents > div.selected .column-name").each(function () {
        $(this).html($(this).attr("ans"));
      });
    } else {
      withinResetElem();
    }
  };
  var withinResetElem = function () {
    $(".PT4-2-2-5 .contents > div.selected .column-name").each(function () {
      $(this).html("");
    });
    if ($(".PT4-2-2-5 .contents > div:nth-child(1).selected").length > 0) {
      if (typeof window.PT4_2_2_mission3 === "undefined") {
        $(".PT4-2-2-5 .toy.cards.m3Card").hide();
        $(".PT4-2-2-5 .toy.cards.m3Arrow").attr("ap", "65,300");
      } else {
        if (window.PT4_2_2_mission3 == true) {
          $(".PT4-2-2-5 .toy.cards.m3Card").show();
          $(".PT4-2-2-5 .toy.cards.m3Arrow").attr("ap", "65,300^203,290");
        } else {
          $(".PT4-2-2-5 .toy.cards.m3Card").hide();
          $(".PT4-2-2-5 .toy.cards.m3Arrow").attr("ap", "65,300");
        }
      }
    }
  };
</script>
