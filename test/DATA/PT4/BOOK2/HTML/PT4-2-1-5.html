  <script>
    var modifyText = (item) => {
      event.stopPropagation();
      var text = window.prompt("請輸入答案：", "");
      if (text === null) {
        rootSoundEffect($show);
        return; // 取消則不處理
      } else {
        item.html(text);
        rootSoundEffect($key);
      }
    };

    var selectShow = (item) => {
      item.toggleClass("selected");
      rootSoundEffect($key);
      $("#shows-count").text(
        item.parent().find(".show-selector.selected").length,
      );
    };
    $(".PT4-2-1-5 .show-selector").each(function () {
      $(this).removeClass("selected");
    });
    var loopDuration = (item) => {
      event.stopPropagation();
      event.stopImmediatePropagation();
      var durationList = ["15", "30", "45", "60", "75", "90"];
      var currentIndex = durationList.indexOf(item.html());
      var nextIndex = (currentIndex + 1) % durationList.length;
      item.html(durationList[nextIndex]);
      rootSoundEffect($key);
    };

    //dynamic function for this html only
    var withinShowAnswer = function (boolean) {
      if (boolean) {
        $(
          ".PT4-2-1-5 .column-text,.PT4-2-1-5 .column-count,.PT4-2-1-5 .column-name",
        ).each(function () {
          $(this).html($(this).attr("ans"));
        });
        $(".PT4-2-1-5 .show-selector").each(function () {
          if ($(this).attr("ans") == "1") {
            $(this).addClass("selected");
          } else {
            $(this).removeClass("selected");
          }
        });
      } else {
        withinResetElem();
      }
    };

    var withinResetElem = function () {
      $(
        ".PT4-2-1-5  .column-text,.PT4-2-1-5 .column-count,.PT4-2-1-5 .column-name",
      ).each(function () {
        $(this).html("");
      });
      $(".PT4-2-1-5 .show-selector").each(function () {
        $(this).removeClass("selected");
      });

      rootSoundEffect($show);
    };
  </script>
