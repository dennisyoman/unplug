<div id="module_wrapper" class="module_fillin PT4-3-2-4">
  <div class="tabs">
    <span>任務一</span>
  </div>

  <div class="units-title wow bounceInRight"></div>

  <div class="sideTool">
    <div class="btn_answer"></div>
    <div class="btn_check"></div>
    <div class="btn_replay"></div>
    <div class="btn_discover" onClick="toggleAttachment('Graph', this)"></div>
  </div>

  <div id="contents" class="contents">
    <!--任務一-->
    <div>
      <div class="intro">
        <div>
          <h3>How to play?</h3>
          <p>
            <b>文生圖</b
            >：看著貓咪相片分析他們的特徵，根據琪琪的特徵規則，把相片跟名字連結起來吧！
          </p>
          <img src="./DATA/PT4/BOOK3/IMAGES/PT4-3-2-4-intro.png" />
          <span class="cta" onClick="switchIntro()">START</span>
        </div>
      </div>
      <div class="subject wow fadeIn tti" style="height: 300px">
        <div class="sensorArea">
          <!-- 名字 -->
          <span
            opt="name"
            class="sensor"
            style="width: 45px; height: 40px; top: 98px; left: 66px"
            ans="蛋黃"
          />
          <span
            opt="name"
            class="sensor"
            style="width: 45px; height: 40px; top: 98px; left: 112px"
            ans="小毛"
          />
          <span
            opt="name"
            class="sensor"
            style="width: 45px; height: 40px; top: 98px; left: 157px"
            ans="湯圓"
          />
          <span
            opt="name"
            class="sensor"
            style="width: 45px; height: 40px; top: 98px; left: 203px"
            ans="炭炭"
          />
          <span
            opt="name"
            class="sensor"
            style="width: 45px; height: 40px; top: 98px; left: 249px"
            ans="小吉"
          />

          <!-- 性別 -->
          <span
            opt="gender"
            class="sensor"
            style="width: 45px; height: 40px; top: 141px; left: 66px"
            ans="female"
          />
          <span
            opt="gender"
            class="sensor"
            style="width: 45px; height: 40px; top: 141px; left: 112px"
            ans="female"
          />
          <span
            opt="gender"
            class="sensor"
            style="width: 45px; height: 40px; top: 141px; left: 157px"
            ans="female"
          />
          <span
            opt="gender"
            class="sensor"
            style="width: 45px; height: 40px; top: 141px; left: 203px"
            ans="male"
          />
          <span
            opt="gender"
            class="sensor"
            style="width: 45px; height: 40px; top: 141px; left: 249px"
            ans="male"
          />

          <!-- 顏色 -->
          <span
            opt="colour"
            class="sensor"
            style="width: 45px; height: 40px; top: 180px; left: 66px"
            ans="3"
          />
          <span
            opt="colour"
            class="sensor"
            style="width: 45px; height: 40px; top: 180px; left: 112px"
            ans="2"
          />
          <span
            opt="colour"
            class="sensor"
            style="width: 45px; height: 40px; top: 180px; left: 157px"
            ans="3"
          />
          <span
            opt="colour"
            class="sensor"
            style="width: 45px; height: 40px; top: 180px; left: 203px"
            ans="1"
          />
          <span
            opt="colour"
            class="sensor"
            style="width: 45px; height: 40px; top: 180px; left: 249px"
            ans="2"
          />

          <!-- 眼睛 -->
          <span
            opt="eye"
            class="sensor"
            style="width: 45px; height: 40px; top: 221px; left: 66px"
            ans="blue"
          />
          <span
            opt="eye"
            class="sensor"
            style="width: 45px; height: 40px; top: 221px; left: 112px"
            ans="yellow"
          />
          <span
            opt="eye"
            class="sensor"
            style="width: 45px; height: 40px; top: 221px; left: 157px"
            ans="yellow"
          />
          <span
            opt="eye"
            class="sensor"
            style="width: 45px; height: 40px; top: 221px; left: 203px"
            ans="yellow"
          />
          <span
            opt="eye"
            class="sensor"
            style="width: 45px; height: 40px; top: 221px; left: 249px"
            ans="blue"
          />
        </div>

        <img
          style="height: 100%"
          src="./DATA/PT4/BOOK3/IMAGES/PT4-3-2-4-1.png"
        />
      </div>

      <div class="options name loop">
        <div class="option" fillin="蛋黃">
          <span class="fillin">蛋黃</span>
        </div>
        <div class="option" fillin="小毛">
          <span class="fillin">小毛</span>
        </div>
        <div class="option" fillin="湯圓">
          <span class="fillin">湯圓</span>
        </div>
        <div class="option" fillin="炭炭">
          <span class="fillin">炭炭</span>
        </div>
        <div class="option" fillin="小吉">
          <span class="fillin">小吉</span>
        </div>
      </div>
      <div class="options gender loop">
        <div class="option" fillin="male">
          <span class="fillin">公</span>
        </div>
        <div class="option" fillin="female">
          <span class="fillin">母</span>
        </div>
      </div>

      <div class="options colour loop">
        <div class="option" fillin="1">
          <span class="fillin">1</span>
        </div>
        <div class="option" fillin="2">
          <span class="fillin">2</span>
        </div>
        <div class="option" fillin="3">
          <span class="fillin">3</span>
        </div>
      </div>

      <div class="options eye loop">
        <div class="option" fillin="blue">
          <span class="fillin">藍色</span>
        </div>
        <div class="option" fillin="yellow">
          <span class="fillin">黃色</span>
        </div>
      </div>
    </div>
  </div>

  <div class="assetsPreload"></div>
</div>
