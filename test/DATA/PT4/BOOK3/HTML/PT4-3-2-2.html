            <span

            ></span>

              content="眼睛顏色：蛋黃和小吉的眼睛是藍色的，其他都是黃色的。"
            ></span>
            <span
              onClick="boxAddMe($(this))"
              style="top: 6px; left: 293px; width: 170px; height: 9px"

            <span
              onClick="boxAddMe($(this))"
              style="top: 15px; left: 260px; width: 87px; height: 9px"

            ></span>

            ></span>
            <span
              onClick="boxAddMe($(this))"
              style="top: 137px; left: 304px; width: 129px; height: 26px"
              content="(湯圓)or(炭炭)有黃眼睛？意思是「湯圓或是炭炭其中有是黃眼睛的嗎？」"
