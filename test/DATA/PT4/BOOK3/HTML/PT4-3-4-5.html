    border: 2px solid #ffef19;
    box-sizing: border-box;
  }
</style>
<script>
  var roleStarObserver = null;
  var roleStarSyncTimer = null;
  var roleStarSyncing = false;

  var disconnectRoleStarObserver = function () {
    if (roleStarObserver) {
      roleStarObserver.disconnect();
      roleStarObserver = null;
    }
    if (roleStarSyncTimer) {
      clearTimeout(roleStarSyncTimer);
      roleStarSyncTimer = null;
    }
  };

  var scheduleSyncRoleStars = function () {
    if (roleStarSyncing) return;
    if (roleStarSyncTimer) clearTimeout(roleStarSyncTimer);
    roleStarSyncTimer = setTimeout(function () {
      roleStarSyncTimer = null;
      syncRoleStars();
    }, 0);
  };

  var connectRoleStarObserver = function () {
    disconnectRoleStarObserver();
    var $root = $(".PT4-3-4-5");
    if ($root.length === 0) return;

    roleStarObserver = new MutationObserver(function (mutations) {
      if (roleStarSyncing) return;
      for (var i = 0; i < mutations.length; i++) {
        var m = mutations[i];
        if (m.type !== "childList") continue;
        var t = m.target;
        if (!t || !t.closest) continue;
        if (!t.closest(".PT4-3-4-5 .contents > div.selected .puzzle")) continue;
        if (!t.closest(".items")) continue;
        scheduleSyncRoleStars();
        return;
      }
    });

    roleStarObserver.observe($root.get(0), {
      subtree: true,
      childList: true,
    });
  };

  var syncRoleStars = function () {
    var $puzzle = $(".PT4-3-4-5 .contents > div.selected .puzzle");
    var $code = $(".PT4-3-4-5 .contents > div.selected .code");
    roleStarSyncing = true;
    disconnectRoleStarObserver();
    try {
      if ($puzzle.length === 0 || $code.length === 0) return;

      // reset stars on all role cards
      $code.find(".items > span").each(function () {
        $(this).find(".star").remove();
        $(this).removeClass("mostStars");
      });

      var counts = {};
      $puzzle.find(".items > span[iid]").each(function () {
        var id = ($(this).attr("iid") || "").trim();
        if (!id) return;
        counts[id] = (counts[id] || 0) + 1;
      });

      Object.keys(counts).forEach(function (id) {
        var n = counts[id] || 0;
        var $card = $code.find('.items > span[iid="' + id + '"]').eq(0);
        if ($card.length === 0) return;
        for (var i = 0; i < n; i++) {
          $card.append('<span class="star"></span>');
        }
      });

      var maxCount = 0;
      Object.keys(counts).forEach(function (id) {
        maxCount = Math.max(maxCount, counts[id] || 0);
      });
      if (maxCount <= 0) return;

      Object.keys(counts).forEach(function (id) {
        if ((counts[id] || 0) !== maxCount) return;
        var $card = $code.find('.items > span[iid="' + id + '"]').eq(0);
        if ($card.length === 0) return;
        $card.addClass("mostStars");
      });
    } finally {
      roleStarSyncing = false;
      connectRoleStarObserver();
    }
  };

  $(function () {
    connectRoleStarObserver();
  });

  var checkAvailable = function (item) {
    var puzzle = $(".PT4-3-4-5 .contents > div.selected .puzzle");
    var items = puzzle.find(".items");
    var currentItems = puzzle.find(".items.selected");
    var itemText = item.text() || "";
    if (currentItems.length > 0) {
      if (currentItems.index() > 0) {
        var prevItems = items.eq(currentItems.index() - 1);
        //如果item.html()沒有在prevItems.find("span").html()裡面，則跳提醒
        var matched = prevItems
          .find("span")
          .toArray()
          .some((el) => ($(el).text() || "").includes(itemText));
        if (!matched) {
          rootSoundEffect($stupid);
          var alertmsg = "選項需要同時符合上面問題的條件。";
          $(".alert").remove();
          $(".contents > div.selected").append(
            `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
          );
          return;
        }
      }
    }
    var existed = currentItems
      .find("span")
      .toArray()
      .some((el) => ($(el).text() || "").includes(itemText));
    if (existed) {
      rootSoundEffect($stupid);
      var alertmsg = "此選項已經選過了。";
      $(".alert").remove();
      $(".contents > div.selected").append(
        `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
      );
      return;
    }
    trigMe(item);
  };

  var modifyCondition = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    var text = window.prompt("請自行輸入，或使用建議答案：", item.attr("ans"));
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      item.html(text);
      rootSoundEffect($key);
    }
    //
    $(".sideTool > div.btn_replay").show();
  };

  var modifyText = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    var text = window.prompt("請輸入文字：", "");
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      item.html(text);
      rootSoundEffect($key);
    }
    //
    $(".sideTool > div.btn_replay").show();
  };

  var toggleYN = (item) => {
    var NYArr = ["是", "不是"];
    event.stopPropagation();
    event.stopImmediatePropagation();
    rootSoundEffect($key);
    var text = item.text();
    if (NYArr.includes(text)) {
      var currentIndex = NYArr.indexOf(text);
      var nextIndex = (currentIndex + 1) % NYArr.length;
      item.html(NYArr[nextIndex]);
    } else {
      item.html(NYArr[0]);
    }
    //
    $(".sideTool > div.btn_replay").show();
  };

  var withinShowAnswer = (boolean) => {
    if (boolean) {
      $(".PT4-3-4-5 .contents .puzzle .conditions > span").each(function () {
        $(this).html($(this).attr("ans"));
      });
    } else {
      withinResetElem();
    }
  };

  var withinResetElem = () => {
    $(".PT4-3-4-5 .contents .puzzle .conditions > span").each(function () {
      $(this).html("");
    });
    // reset role stars (decode reset may clear puzzle spans elsewhere)
    $(".PT4-3-4-5 .contents .code .items > span").each(function () {
      $(this).find(".star").remove();
      $(this).removeClass("mostStars");
    });
    scheduleSyncRoleStars();
  };
</script>
