<script>
  var trigMeCheck2 = function (tar) {
    var group = tar.attr("group");
    tar.siblings(`[group="${group}"]`).removeClass("wrong selected");
    tar.removeClass("wrong").toggleClass("selected");
    rootSoundEffect($show);
    //
    $(".sideTool > div.btn_answer").removeClass("active");
    $(".alert").remove();
  };

  var modifyCondition = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    var text = window.prompt("請自行輸入，或使用建議答案：", item.attr("ans"));
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      item.html(text);
      rootSoundEffect($key);
    }
    //
    $(".sideTool > div.btn_replay").show();
  };

  var withinShowAnswer = (boolean) => {
    if (boolean) {
      $(".PT4-3-4-4 .contents .puzzle .conditions > span").each(function () {
        $(this).html($(this).attr("ans"));
      });
    } else {
      withinResetElem();
    }
  };

  var withinResetElem = () => {
    $(".PT4-3-4-4 .contents .puzzle .conditions > span").each(function () {
      $(this).html("");
    });
  };
</script>
