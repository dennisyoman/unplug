</style>

<script>
  var modifyNumber = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    var text = window.prompt("請輸入答案：", "");
    item.removeClass("wrong");
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      // only digits, no spaces/symbols/letters
      if (!/^\d+$/.test(text)) {
        rootSoundEffect($stupid);
        var alertmsg = "只能輸入數字，不能有空白、符號或其他文字。";
        $(".alert").remove();
        $(".contents > div.selected").append(
          `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
        );
        return;
      }
      item.html(text);
      item.attr("fillin", text);
      rootSoundEffect($key);
      //
      $(".sideTool > div.btn_check").show();
      $(".sideTool > div.btn_replay").show();
    }
  };

  //dynamic function for this html only
  var withinShowAnswer = function (boolean) {
    if (boolean) {
      $(".PT4-3-3-5 .contents > div.selected .column-number").each(function () {
        $(this).html($(this).attr("ans"));
      });
    }
  };
</script>
