<style>
  .PT4-3-2-5 .sensor[filter].selected {
    border: 2px solid #ff0000;
  }
  .PT4-3-2-5 .sensor[opt="slash"]:empty {
    animation: none;
  }
  .PT4-3-2-5 .sensor[opt="slash"] {
    pointer-events: none;
    font-size: 60px;
    color: #ff0000;
    animation: bounceIn 1s both;
    transform-origin: top left;
  }
</style>
<script>
  var checkSubans = (item) => {
    var team = item.attr("team");
    var noAnsYet = item.parent().find("[team='" + team + "']:empty").length;
    if (noAnsYet > 1) {
      rootSoundEffect($stupid);
      var alertmsg = "請先回答完下方的子題目，再來回答主題目唷！";
      $(".alert").remove();
      $(".contents > div.selected").append(
        `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
      );
      event.stopPropagation();
      event.stopImmediatePropagation();
      return;
    }
  };

  var filterCats = (item) => {
    event.stopPropagation();
    event.stopImmediatePropagation();
    //setup
    item.toggleClass("selected");
    $(".sensor[cat]").empty();
    //filter
    var filters = $(".sensor[filter].selected");
    for (var i = 0; i < filters.length; i++) {
      var filterItem = filters.eq(i);
      var cats = filterItem.attr("filter");
      var catArr = cats.split("^");
      for (var k = 0; k < catArr.length; k++) {
        $(".sensor[cat='" + catArr[k] + "']").click();
        rootSoundEffect($show);
      }
    }
  };
</script>
