<script>
  var isCapsuleEmpty = function ($capsule) {
    return (
      $capsule
        .text()
        .replace(/\u00a0/g, " ")
        .trim() === ""
    );
  };

  var recordOrder = function (order) {
    var $orderSensor = $(".PT4-4-2-5 .contents > div.selected .sensors .order");
    $orderSensor.text($orderSensor.text() + order);
  };

  var indicateAvailableCapsule = function () {
    var $capsules = $(".PT4-4-2-5 .contents > div.selected .sensors .capsule");
    $capsules.addClass("disabled");

    var groups = [];
    for (var i = 0; i < $capsules.length; i += 3) {
      groups.push($capsules.slice(i, i + 3));
    }

    var $activeGroup = null;
    for (var g = 0; g < groups.length; g++) {
      var allFilled = true;
      groups[g].each(function () {
        if (isCapsuleEmpty($(this))) {
          allFilled = false;
        }
      });
      if (!allFilled) {
        $activeGroup = groups[g];
        break;
      }
    }

    if ($activeGroup) {
      $activeGroup.each(function () {
        if (isCapsuleEmpty($(this))) {
          $(this).removeClass("disabled");
        }
      });
    }
  };
  /* 共用 */
  var takeBag = function (tar, sum) {
    $(".alert").remove();
    var bagSelected = tar.parent().siblings(".bags").find(".selected");
    if (bagSelected.length > 0) {
      rootSoundEffect($pop);

      var bag = bagSelected.attr("ans");
      tar.text(bag);
      bagSelected.removeClass("selected").addClass("disabled");
      //sumup
      var $sumSensor = $(
        `.PT4-4-2-5 .contents > div.selected .sensors .${sum}`,
      );
      var currentSum = parseInt($sumSensor.text().trim(), 10) || 0;
      $sumSensor.text(currentSum + (parseInt(bag, 10) || 0));
      //
      if (bagSelected.parent().hasClass("limited")) {
        indicateAvailableCapsule();
      }
      $(".sideTool > div.btn_answer").removeClass("active");
      $(".sideTool > div.btn_replay").show();
    } else {
      //先選擇袋子
      rootSoundEffect($stupid);
      var alertmsg = "請先選擇盲盒";
      $(".alert").remove();
      $(".contents > div.selected").append(
        `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
      );
    }
  };

  var fillContent = function (tar) {
    $(".alert").remove();
    var text = window.prompt("請輸入答案：", tar.text() ?? "");
    tar.removeClass("wrong");
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      // only digits, no spaces/symbols/letters
      if (!/^\d+$/.test(text)) {
        rootSoundEffect($stupid);
        var alertmsg = "只能輸入數字，不能有空白、符號或其他文字。";
        $(".alert").remove();
        $(".contents > div.selected").append(
          `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
        );
        return;
      }
      tar.html(text);
      rootSoundEffect($key);
      //
      $(".sideTool > div.btn_replay").show();
    }
  };

  var withinShowAnswer = function (boolean) {
    if (boolean) {
      $(".PT4-4-2-5 .contents > div.selected .bags > div")
        .removeClass("selected")
        .addClass("disabled");
      $(".alert").remove();
      $(".PT4-4-2-5 .contents > div.selected .sensors .sensor").each(
        function () {
          var ans = $(this).attr("ans");
          $(this).html(ans);
        },
      );
    }
  };

  var withinResetElem = function () {
    $(".PT4-4-2-5 .contents > div.selected .bags > div").each(function () {
      $(this).removeClass("disabled");
      var ans = $(this).attr("ans");
      $(this).find("span").html(ans);
      $(this)
        .unbind("click")
        .bind("click", function () {
          $(this)
            .addClass("selected")
            .siblings(".selected")
            .removeClass("selected");
          rootSoundEffect($pop);
          //limited bags
          if ($(this).parent().hasClass("limited")) {
            indicateAvailableCapsule();
          }
        });
    });

    $(".PT4-4-2-5 .contents > div.selected .sensors .sensor")
      .removeClass("disabled")
      .html("");

    if ($(".PT4-4-2-5 .contents > div:nth-child(3).selected").length > 0) {
      if (typeof window.PT4_4_2_mission3 === "undefined") {
        //表示還沒有玩過文生圖
        window.PT4_4_2_mission3 = true;
        console.log("還沒文生圖");
