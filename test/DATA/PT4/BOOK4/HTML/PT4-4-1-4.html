<style>
  .PT4-4-1-4 .contents .sensors .sensor {
    font-size: 12px;
    line-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .PT4-4-1-4 .contents .sensors .sensor[diff] {
    pointer-events: none;
  }
  .PT4-4-1-4 .contents .sensors .sensor.selected::after {
    content: "";
    top: 50%;
    left: 0;
    width: 250px;
    border-top: 2px solid #ff0000;
    z-index: 9;
    position: absolute;
    transform: translateY(-50%);
  }
</style>

<script>
  var fillContent = function (tar) {
    var text = window.prompt("請輸入答案：", tar.text() ?? "");
    tar.removeClass("wrong");
    if (text === null) {
      rootSoundEffect($show);
      return; // 取消則不處理
    } else {
      // only digits, no spaces/symbols/letters
      if (!/^\d+$/.test(text)) {
        rootSoundEffect($stupid);
        var alertmsg = "只能輸入數字，不能有空白、符號或其他文字。";
        $(".alert").remove();
        $(".contents > div.selected").append(
          `<div class="alert wow bounceInUp" onclick="$(this).remove()">${alertmsg}</div>`,
        );
        return;
      }
      tar.html(text);
      rootSoundEffect($key);
      //
      $(".sideTool > div.btn_replay").show();
    }
    //計算數學
    var group = tar.attr("group");
    var sensors = $(`#module_wrapper .sensor[group="${group}"]`);
    var t0 = sensors.eq(0).text().trim();
    var t1 = sensors.eq(1).text().trim();
    var $diff = $(`#module_wrapper .sensor[diff="${group}"]`);
    if (t0 !== "" && t1 !== "") {
      var v0 = parseInt(t0, 10);
      var v1 = parseInt(t1, 10);
      $diff.text((Number.isNaN(v0) ? 0 : v0) - (Number.isNaN(v1) ? 0 : v1));
    } else {
      $diff.text("");
    }
  };

  var eliminateWarrior = function (tar) {
    tar.toggleClass("selected");
    //
    $(".sideTool > div.btn_replay").show();
  };

  var withinShowAnswer = function (boolean) {
    if (boolean) {
      $(".PT4-4-1-4 .contents .sensors .sensor").each(function () {
        if ($(this).attr("eliminate")) {
          if ($(this).attr("eliminate") == 1) {
            $(this).addClass("selected");
          } else {
            $(this).removeClass("selected");
          }
        } else {
          var ans = $(this).attr("ans");
          $(this).html(ans);
          //計算數學
          var group = $(this).attr("group");
          var sensors = $(`#module_wrapper .sensor[group="${group}"]`);
          var t0 = sensors.eq(0).text().trim();
          var t1 = sensors.eq(1).text().trim();
          var $diff = $(`#module_wrapper .sensor[diff="${group}"]`);
          if (t0 !== "" && t1 !== "") {
            var v0 = parseInt(t0, 10);
            var v1 = parseInt(t1, 10);
            $diff.text(
              (Number.isNaN(v0) ? 0 : v0) - (Number.isNaN(v1) ? 0 : v1),
            );
          } else {
            $diff.text("");
          }
        }
      });
    }
  };

  var withinResetElem = function () {
    $(".PT4-4-1-4 .contents .sensors .sensor").each(function () {
      $(this).empty();
    });
  };
</script>
